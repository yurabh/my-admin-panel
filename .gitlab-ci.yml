run_tests:
  image: php:8.2

  before_script:
    # 1. Оновлюємо систему (якщо треба розширення)
    - apt-get update && apt-get install -y git zip unzip

    # Встановлюємо Composer (офіційний спосіб для Docker-образів)
    - curl -sS https://getcomposer.org | php -- --install-dir=/usr/local/bin --filename=composer

    # 2. ВСТАНОВЛЮЄМО ЗАЛЕЖНОСТІ (це створить файл autoload.php)
    - composer install --no-interaction --prefer-dist --optimize-autoloader

    # 3. Налаштовуємо оточення
    - cp .env.example .env
    - php artisan key:generate

    # Встановлюємо PHP розширення, необхідні для Laravel (pdo_mysql, zip)
    - docker-php-ext-install pdo_mysql zip

  script:
    - php artisan test

