run_tests:
  image: php:8.2

  variables:
      # Налаштовуємо базу в пам'яті, щоб не піднімати MySQL
      DB_CONNECTION: sqlite
      DB_DATABASE: ":memory:"

  before_script:
    # 1. Оновлюємо систему (якщо треба розширення)
    - apt-get update && apt-get install -y git zip unzip  libzip-dev

    # Встановлюємо PHP розширення, необхідні для Laravel (pdo_mysql, zip)
    - docker-php-ext-install pdo_mysql zip

    # Встановлюємо Composer (офіційний спосіб для Docker-образів)
    - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer

    # 2. ВСТАНОВЛЮЄМО ЗАЛЕЖНОСТІ (це створить файл autoload.php)
    - composer install --no-interaction --prefer-dist --optimize-autoloader

    # 3. Налаштовуємо оточення
    - cp .env.example
    - php artisan key:generate

  script:
    - php artisan test
