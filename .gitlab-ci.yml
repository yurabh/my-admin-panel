stages:
  - build
  - test
  - deploy

variables:
  APP_ENV: testing
  DB_CONNECTION: sqlite
  DB_DATABASE: ":memory:"
  IMAGE_NAME: yurabh1990/admin-panel-repository
  IMAGE_TAG: php.8.2

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - vendor/
    - storage/framework/cache/

app_test:
  stage: test
  image: php:8.2
  before_script:
    # Clear PHPUnit cache
    - rm -rf .phpunit.cache

    # Update system packages and install build dependencies
    - apt-get update && apt-get install -y git zip unzip  libzip-dev

    # Install PHP extensions required for Laravel (pdo_mysql, zip)
    - docker-php-ext-install pdo_mysql zip

    # Install Composer binary via the official installer
    - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer

    # Install PHP dependencies via Composer
    - composer install --no-interaction --prefer-dist --optimize-autoloader

    # Clear Laravel cached files
    - php artisan optimize:clear

    # Run database migrations
    - php artisan migrate --force

    # Copy test .env file
    - cp $TEST_ENV_FILE .env
  script:
    - php artisan test


php_build:
  stage: build
  when: manual
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  rules:
#    - if: $CI_COMMIT_BRANCH == "main"
  before_script:
    - docker login -u $REGISTRY_USER -p $REGISTRY_PASSWORD
  script:
    - docker build -f app/Docker/php/Dockerfile -t $IMAGE_NAME:$IMAGE_TAG .
    - docker push $IMAGE_NAME:$IMAGE_TAG
